            <field name="UsrICFBTareFare"></field>
            <field name="UsrICFBNetWeight"></field>
            <field name="UsrICFBRefFGEWRNbr"></field>
            <field name="UsrICFBWaybillNbr"></field>
            <field name="UsrICFBVehicleNbr"></field>
            <field name="UsrICFBVanNbr"></field>
            <field name="UsrICFBSealNbr"></field>
            <field name="UsrICFBContainerLoadingInstructions"></field>
